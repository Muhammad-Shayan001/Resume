
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Shayan | Professional Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e0e7ff 100%);
            padding: 0;
            margin: 0;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        .main-section-title {
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #0f172a;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            padding-left: 12px;
            border-left: 4px solid #4f46e5;
            background: linear-gradient(90deg, #e0e7ff 0%, transparent 100%);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .sidebar-section-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.65rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(90deg, #0f172a 0%, #4f46e5 100%);
            border-radius: 6px;
            padding: 2px 8px;
        }

        .sidebar-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Kaggle certification card hover animation */
        .kaggle-cert-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .kaggle-cert-card:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 4px 16px 0 rgba(79,70,229,0.13);
        }

        /* Gradient text effect for achievement number */
        .achievement-number {
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tech stack icon hover */
        .tech-stack-icon {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tech-stack-icon:hover {
            transform: scale(1.15);
            box-shadow: 0 2px 8px 0 rgba(16, 185, 129, 0.15);
        }

        /* Sidebar link hover */
        .sidebar-link:hover {
            background: #4f46e5 !important;
            color: #fff !important;
            box-shadow: 0 2px 8px 0 rgba(79,70,229,0.13);
        }

        /* Project card hover */
        .project-card:hover {
            border-color: #4f46e5 !important;
            box-shadow: 0 4px 16px 0 rgba(79,70,229,0.13);
        }

        /* Event card hover */
        .event-card {
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px 0 rgba(79,70,229,0.10);
        }

        /* Skill pill hover */
        .skill-pill {
            transition: all 0.2s ease;
        }

        @media print {
            @page {
                size: auto;
                margin: 10mm;
            }
            body { 
                background: white !important; 
                padding: 0 !important; 
            }
            .no-print { display: none !important; }
            .resume-container {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                width: 100% !important;
                border-radius: 0 !important;
                display: flex !important;
                flex-direction: row !important;
            }
            aside {
                width: 300px !important;
                min-width: 300px !important;
                min-height: 100vh !important;
                background-color: #0f172a !important;
                color: white !important;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
            aside * {
                color: inherit !important;
            }
            .flex-1, main > .flex-1 {
                width: calc(100% - 300px) !important;
                flex: 1 !important;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            /* Only override text in the main body panel, NOT sidebar */
            .flex-1 h1, .flex-1 h2, .flex-1 h3, .flex-1 h4 { color: #0f172a !important; }
            .flex-1 p, .flex-1 li { color: #334155 !important; }
            .text-indigo-500, .text-indigo-600, .text-indigo-400 { color: #4f46e5 !important; }
            .bg-indigo-50, .bg-indigo-600 { print-color-adjust: exact; }
            .print-avoid-break { page-break-inside: avoid; }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
